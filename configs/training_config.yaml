# Fine-tuning configuration for Llama 3 with PEFT/LoRA

model:
  name: "meta-llama/Meta-Llama-3-8B-Instruct"
  max_seq_length: 4096
  load_in_4bit: true
  bnb_4bit_compute_dtype: "bfloat16"
  bnb_4bit_quant_type: "nf4"

lora:
  r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
  bias: "none"
  task_type: "CAUSAL_LM"

training:
  output_dir: "./outputs"
  num_train_epochs: 3
  per_device_train_batch_size: 4
  per_device_eval_batch_size: 4
  gradient_accumulation_steps: 4
  learning_rate: 2.0e-4
  weight_decay: 0.01
  warmup_ratio: 0.03
  lr_scheduler_type: "cosine"
  logging_steps: 10
  save_strategy: "steps"
  save_steps: 100
  eval_strategy: "steps"
  eval_steps: 100
  save_total_limit: 3
  fp16: false
  bf16: true
  max_grad_norm: 0.3
  group_by_length: true
  report_to: "none"

data:
  train_file: "data/training/train.jsonl"
  val_file: "data/training/val.jsonl"
  test_file: "data/training/test.jsonl"
  train_val_test_split: [0.8, 0.1, 0.1]
